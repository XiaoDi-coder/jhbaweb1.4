<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公告通知 - 金华市保安服务有限公司 内部资源共享平台</title>
  <link rel="stylesheet" href="css/style.css?v=20260314" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="site-nav-root"></div>
  <script src="js/api.js?v=20260314"></script>
  <script src="js/auth.js?v=20260314"></script>
  <script src="js/nav.js?v=20260314"></script>

  <main class="main-content">
    <h1 class="page-title">公告通知</h1>
    <p class="text-muted mt-1">公司内部公告与通知，点击可查看详情。管理员可发布与编辑公告。</p>

    <div id="notice-admin-wrap" class="card" style="display: none;">
      <h2 class="card-title">发布公告</h2>
      <form id="notice-form">
        <input type="hidden" id="notice-edit-id" value="" />
        <div class="form-group">
          <label for="notice-title">标题</label>
          <input type="text" id="notice-title" class="form-control" placeholder="公告标题" required maxlength="200" />
        </div>
        <div class="form-group">
          <label for="notice-content">内容</label>
          <textarea id="notice-content" class="form-control" placeholder="公告内容" rows="6" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" id="notice-submit-btn">发布</button>
        <button type="button" class="btn btn-outline btn-clear-search" id="notice-cancel-btn" style="margin-left: 8px;">取消</button>
      </form>
    </div>

    <div class="notice-list" id="notice-list"></div>
  </main>

  <script src="js/notice.js?v=20260314"></script>
</body>
</html>
