<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>修改密码 - 金华市保安服务有限公司 内部资源共享平台</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .cp-wrap { max-width: 400px; margin: 48px auto; }
    .cp-card { padding: 32px; }
    .cp-title { text-align: center; margin-bottom: 8px; }
    .cp-desc { text-align: center; color: var(--color-danger); font-size: 0.9rem; margin-bottom: 24px; }
    .cp-msg { margin-bottom: 12px; padding: 10px; border-radius: var(--radius); font-size: 0.9rem; display: none; }
    .cp-msg.error { background: #fed7d7; color: var(--color-danger); }
    .cp-msg.success { background: #c6f6d5; color: var(--color-success); }
    .cp-form .btn { width: 100%; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="site-nav-root"></div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>

  <main class="main-content">
    <div class="cp-wrap">
      <div class="card cp-card">
        <h1 class="card-title cp-title">修改密码</h1>
        <p class="cp-desc" id="cp-desc">首次登录或为保障安全，请修改初始密码。新密码至少 6 位。</p>
        <div class="cp-msg" id="cp-msg"></div>
        <form class="cp-form" id="cp-form">
          <div class="form-group">
            <label for="current">当前密码</label>
            <input type="password" id="current" class="form-control" placeholder="请输入当前密码（初始为 12345）" required />
          </div>
          <div class="form-group">
            <label for="newpwd">新密码</label>
            <input type="password" id="newpwd" class="form-control" placeholder="至少 6 位" required minlength="6" />
          </div>
          <div class="form-group">
            <label for="confirm">确认新密码</label>
            <input type="password" id="confirm" class="form-control" placeholder="再次输入新密码" required minlength="6" />
          </div>
          <button type="submit" class="btn btn-primary">确认修改</button>
        </form>
      </div>
    </div>
  </main>

  <script>
    (function () {
      var user = window.__authUser;
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      var form = document.getElementById('cp-form');
      var msgEl = document.getElementById('cp-msg');
      function showMsg(text, isError) {
        msgEl.textContent = text;
        msgEl.className = 'cp-msg ' + (isError ? 'error' : 'success');
        msgEl.style.display = 'block';
      }
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var current = document.getElementById('current').value;
        var newpwd = document.getElementById('newpwd').value;
        var confirmVal = document.getElementById('confirm').value;
        if (newpwd !== confirmVal) {
          showMsg('两次输入的新密码不一致', true);
          return;
        }
        window.__api.auth.changePassword(current, newpwd).then(function (ret) {
          showMsg(ret.message || '密码已修改，请重新登录', false);
          if (window.__auth && window.__auth.logout) window.__auth.logout();
          else {
            try { localStorage.removeItem('authUser'); localStorage.removeItem('authToken'); } catch (err) {}
          }
          setTimeout(function () { window.location.href = 'login.html'; }, 1200);
        }).catch(function (err) {
          showMsg(err && err.message ? err.message : '修改失败', true);
        });
      });
    })();
  </script>
</body>
</html>
